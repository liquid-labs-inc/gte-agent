openapi: 3.1.0
info:
  title: GTE Gateway API
  description: HTTP API surface for the GTE gateway.
  version: 0.1.0
  license:
    name: proprietary
    identifier: proprietary
servers:
- url: http://localhost:8080/v1
  description: Local devnet
tags:
- name: System
- name: Markets
- name: Orders
- name: Accounts
paths:
  /health:
    get:
      operationId: getHealth
      tags:
      - System
      summary: Server health status
      responses:
        '200':
          description: Current gateway health snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerHealthStatus'
  /markets:
    get:
      operationId: getMarkets
      tags:
      - Markets
      summary: List markets
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/MarketType'
      - name: token
        in: query
        required: false
        schema:
          type: string
      - name: sortBy
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/MarketSortBy'
      responses:
        '200':
          description: Paginated market list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMarketsResponse'
  /markets/search:
    get:
      operationId: searchMarkets
      tags:
      - Markets
      summary: Search markets by query
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/MarketType'
      responses:
        '200':
          description: Matching markets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Market'
  /markets/{marketSymbol}:
    get:
      operationId: getMarket
      tags:
      - Markets
      summary: Get a single market by symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Market definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Market'
  /markets/{marketSymbol}/data:
    get:
      operationId: getMarketData
      tags:
      - Markets
      summary: Get live market data for a symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Live market data snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDataPerps'
  /markets/{marketSymbol}/config:
    get:
      operationId: getMarketConfig
      tags:
      - Markets
      summary: Get the market configuration for a symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Market configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketConfigPerps'
  /markets/{marketSymbol}/context/history:
    get:
      operationId: getMarketContextHistory
      tags:
      - Markets
      summary: Get recent mark/index/funding/open-interest snapshots for a symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: int64
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: int64
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Recent public market context history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMarketContextHistoryResponse'
  /markets/{marketSymbol}/book:
    get:
      operationId: getOrderBook
      tags:
      - Markets
      summary: Get the order book for a symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Aggregated order book levels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBook'
  /markets/{marketSymbol}/trades:
    get:
      operationId: getMarketTrades
      tags:
      - Markets
      summary: Get recent public trades for a symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      - name: user
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Public trade history for the market.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTradesResponse'
  /markets/{marketSymbol}/candles:
    get:
      operationId: getMarketCandles
      tags:
      - Markets
      summary: Get OHLCV candles for a symbol
      parameters:
      - name: marketSymbol
        in: path
        required: true
        schema:
          type: string
      - name: from
        in: query
        required: true
        description: Inclusive start timestamp in milliseconds.
        schema:
          type: string
      - name: to
        in: query
        required: false
        description: Exclusive end timestamp in milliseconds.
        schema:
          type: string
      - name: interval
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/CandleInterval'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Candle series.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Candle'
  /orders:
    post:
      operationId: createOrders
      tags:
      - Orders
      summary: Submit one or more orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrdersRequest'
      responses:
        '200':
          description: Per-order placement results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrdersResponse'
  /orders/cancel:
    post:
      operationId: cancelOrders
      tags:
      - Orders
      summary: Cancel one or more orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrdersRequest'
      responses:
        '200':
          description: Per-order cancel results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrdersResponse'
  /orders/twap:
    post:
      operationId: createTwap
      tags:
      - Orders
      summary: Submit a TWAP order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTwapRequest'
      responses:
        '200':
          description: TWAP placement result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTwapResponse'
  /orders/twap/cancel:
    post:
      operationId: cancelTwap
      tags:
      - Orders
      summary: Cancel a TWAP order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelTwapRequest'
      responses:
        '200':
          description: TWAP cancel result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelTwapResponse'
  /orders/replace:
    post:
      operationId: replaceOrders
      tags:
      - Orders
      summary: Replace one or more orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceOrdersRequest'
      responses:
        '200':
          description: Per-order replace results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceOrdersResponse'
  /accounts/{userAddress}/orders:
    get:
      operationId: getOrders
      tags:
      - Accounts
      summary: Get historical orders for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: subaccountId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: minVersion
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Paginated order history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrdersResponse'
  /accounts/{userAddress}/orders/open:
    get:
      operationId: getOpenOrders
      tags:
      - Accounts
      summary: Get open orders for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: clientId
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: subaccountId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: minVersion
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Open orders currently resting on markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOpenOrdersResponse'
  /accounts/{userAddress}/positions:
    get:
      operationId: getPositions
      tags:
      - Accounts
      summary: Get open positions for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: subaccountId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: minVersion
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Open positions for the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPositionsResponse'
  /accounts/{userAddress}/funding:
    get:
      operationId: getFundingHistory
      tags:
      - Accounts
      summary: Get funding payment history for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Funding payment history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFundingHistoryResponse'
  /accounts/{userAddress}/fees:
    get:
      operationId: getFees
      tags:
      - Accounts
      summary: Get fee schedule/tier for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Account fee tier and volume.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFeesResponse'
  /accounts/{userAddress}/balances:
    get:
      operationId: getBalances
      tags:
      - Accounts
      summary: Get token balances for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: minVersion
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Account token balances.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBalancesResponse'
  /accounts/{userAddress}/allowance:
    get:
      operationId: getAllowance
      tags:
      - Accounts
      summary: Get margin engine allowance for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: subaccountId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Allowance snapshot for the account/subaccount.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllowanceResponse'
  /accounts/{userAddress}/metrics:
    get:
      operationId: getAccountMetrics
      tags:
      - Accounts
      summary: Get live account risk metrics
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: minVersion
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Account metrics (collateral, margin ratio, PnL).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountMetricsResponse'
  /accounts/{userAddress}/trades:
    get:
      operationId: getUserTrades
      tags:
      - Accounts
      summary: Get trade history for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: startTime
        in: query
        required: false
        schema:
          type: string
      - name: endTime
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: subaccountId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: minVersion
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: User trade history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserTradesResponse'
  /accounts/{userAddress}/leverage:
    get:
      operationId: getLeverage
      tags:
      - Accounts
      summary: Get leverage setting for an account/market
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: subaccountId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Current leverage setting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLeverageResponse'
    post:
      operationId: setLeverage
      tags:
      - Accounts
      summary: Update leverage setting for an account/market
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLeverageBody'
      responses:
        '200':
          description: Updated leverage setting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetLeverageResponse'
  /accounts/{userAddress}/next-subaccount:
    get:
      operationId: getNextSubaccount
      tags:
      - Accounts
      summary: Get the next available subaccount id for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Next allocatable subaccount id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNextSubaccountResponse'
  /accounts/{userAddress}/balances/history:
    get:
      operationId: getBalanceHistory
      tags:
      - Accounts
      summary: Get historical balance snapshots for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: from
        in: query
        required: true
        description: Inclusive start timestamp in milliseconds. Account history queries are bounded to protect projection-backed reads.
        schema:
          type: string
      - name: to
        in: query
        required: true
        description: Exclusive end timestamp in milliseconds. The requested window must fit the account history retention window served by this API.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Maximum number of points returned across spot and perp series. Defaults to 5000 and is capped at 5000.
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 5000
      responses:
        '200':
          description: Historical balance series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBalanceHistoryResponse'
  /accounts/{userAddress}/pnl/history:
    get:
      operationId: getPnlHistory
      tags:
      - Accounts
      summary: Get historical PnL snapshots for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: from
        in: query
        required: true
        description: Inclusive start timestamp in milliseconds. Account history queries are bounded to protect projection-backed reads.
        schema:
          type: string
      - name: to
        in: query
        required: true
        description: Exclusive end timestamp in milliseconds. The requested window must fit the account history retention window served by this API.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Maximum number of points returned across spot and perp series. Defaults to 5000 and is capped at 5000.
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 5000
      responses:
        '200':
          description: Historical PnL series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPnlHistoryResponse'
  /accounts/{userAddress}/twaps:
    get:
      operationId: getTwapHistory
      tags:
      - Accounts
      summary: Get TWAP order history for an account
      parameters:
      - name: userAddress
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Paginated TWAP history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTwapHistoryResponse'
components:
  schemas:
    CandleInterval:
      type: string
      enum:
      - 1m
      - 2m
      - 3m
      - 5m
      - 10m
      - 15m
      - 20m
      - 30m
      - 1h
      - 4h
      - 1d
      - 1w
    OrderRejectReason:
      type: string
      enum:
      - invalid_session
      - invalid_account
      - invalid_market
      - invalid_side
      - invalid_price
      - invalid_quantity
      - insufficient_allowance
      - order_not_found
      - market_closed
      - rate_limit_exceeded
      - invalid_signature
      - unauthorized_signer
      - signature_expired
      - invalid_nonce
      - no_allowance
      - allowance_expired
      - invalid_order
      - book_at_capacity
    OrderStatus:
      type: string
      enum:
      - new
      - partially_filled
      - filled
      - cancelled
      - rejected
      - expired
      - replaced
      - pending_new
    OrderType:
      type: string
      enum:
      - market
      - limit
      - stop_limit
      - stop_market
      - liquidation
    PositionSide:
      type: string
      enum:
      - long
      - short
    Side:
      type: string
      enum:
      - buy
      - sell
    TimeInForce:
      type: string
      enum:
      - gtc
      - ioc
      - fok
      - gtd
    TokenType:
      type: string
      enum:
      - crypto
      - stablecoin
      - equities
      - commodities
    Tpsl:
      type: string
      enum:
      - tp
      - sl
    TradeDirection:
      type: string
      enum:
      - open_long
      - open_short
      - long_to_short
      - short_to_long
      - close_long
      - close_short
    TwapStatus:
      type: string
      enum:
      - activated
      - finished
      - terminated
      - error
    SetLeverageBody:
      x-rust-type: crate::models::SetLeverageBody
      type: object
      required:
      - symbol
      - leverage
      - subaccountId
      - nonce
      - signature
      properties:
        symbol:
          type: string
        leverage:
          type: integer
          format: int32
        subaccountId:
          type: integer
          format: int32
          minimum: 0
        nonce:
          type: number
        signature:
          type: string

    PerpPosition:
      x-rust-type: turbo_rpc::api::PerpPosition
      type: object
      required:
      - accountId
      - marketSymbol
      - size
      - positionValue
      - side
      - entryPrice
      - markPrice
      - liquidationPrice
      - leverage
      - margin
      - funding
      - isCross
      - subaccountId
      - unrealizedPnl
      - timestamp
      properties:
        accountId:
          type: string
        marketSymbol:
          type: string
        size:
          type: string
        positionValue:
          type: string
        side:
          $ref: '#/components/schemas/PositionSide'
        entryPrice:
          type: string
        markPrice:
          type: string
        liquidationPrice:
          type: string
        leverage:
          type: integer
          format: int32
        margin:
          type: string
        funding:
          type: string
        isCross:
          type: boolean
        subaccountId:
          type: integer
          format: int32
          minimum: 0
        unrealizedPnl:
          type: string
        timestamp:
          type: string
          format: int64
    AllPerpPosition:
      type: object
      required:
      - accountId
      - marketSymbol
      - size
      - positionValue
      - side
      - entryPrice
      - markPrice
      - liquidationPrice
      - leverage
      - margin
      - funding
      - isCross
      - subaccountId
      - unrealizedPnl
      - timestamp
      properties:
        accountId:
          type: string
        marketSymbol:
          type: string
        size:
          type: string
        positionValue:
          type: string
        side:
          $ref: '#/components/schemas/PositionSide'
        entryPrice:
          type: string
        markPrice:
          type: string
        liquidationPrice:
          type: string
        leverage:
          type: integer
          format: int32
        margin:
          type: string
        funding:
          type: string
        isCross:
          type: boolean
        subaccountId:
          type: integer
          format: int32
